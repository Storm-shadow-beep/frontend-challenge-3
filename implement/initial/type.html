<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="shortcut icon" href="../../assets/images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="type.css">
</head>
<body>
    <div>
    <header>
            <img src="../../assets/images/logo-large.svg" alt="game logo" class="logo">
            <div>
                <p><img src="../../assets/images/icon-personal-best.svg" alt="prize logo">Personal best: <span id="best"></span></p>
            </div>
    </header>
    <div class="init" id="init">
    <section class="nav">
            <div class="stats">
                <p>WPM:       <span id="wpm">0</span> |</p>
                <p>Accuracy:       <span id="acc">0</span>%  |</p>
                <p>Time      <span id="time"></span></p>
            </div>
            <div class="modes">
                <div style="display: flex; gap: 9px;">
                    <ul>
                        <button class="bt" data-level="easy">Easy</button>
                        <button class="bt" data-level="medium">Medium</button>
                        <button class="bt" data-level="hard">Hard</button>
                    </ul>
                    <p>|</p> 
                </div>

                <div class="end">
                    <p>Mode:</p>
                    <button>Timed(<span>60</span>)</button>
                    <button>Passage</button>
                </div>
            </div>
    </section>
    <section class="main-body">
        <div>
            <p id="para"></p>
            <div class="who">
                <button id="start">Start Typing Test</button>
                <p>Or click the text and start typing</p>
            </div>
        </div>
    </section>
</div>
<div class="ATH" id="ATH">
    <div>
        <div class="logo-grow-wrapper"><img src="../../assets/images/icon-completed.svg" alt="completed logo" class="logo-svg" id="img"></div>
        <h1 id="celeb-H">Baseline Established!</h1>
        <p id="celeb-p">You've set the bar. Now the real challenge begins-time to beat it.</p>
        <div>
            <div>
                <h3 >WPM:</h3>
                <p id="wpm1">10</p>
            </div>
            <div>
                <h3>Accuracy:</h3>
                <p id="acc1">90%</p>
            </div>
            <div>
                <h3>Characters</h3>
                <p id="words">120/5</p>
            </div>
        </div>
        <button style="background-color: white;display: flex;justify-content: center;color: black;" id="restart">Beat This Score  <img src="../../assets/images/icon-restart.svg" alt="restart allow" style="background-color: black;border-radius: 10px;height: 15px;"></button>
    </div>
</div>
</div>
<script type="module" src="try.js"></script>
</body>
</html>
